<!DOCTYPE html>
<html lang="id">

<head>
    <meta charset="UTF-8">
    <title>Daksin Brainstorming</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600&display=swap" rel="stylesheet">

    <style>
        /* ===== BASE ===== */
        body {
            margin: 0;
            font-family: 'Inter', sans-serif;
            overflow: hidden;
            background: #ffffff;
        }

        /* ===== IFRAME FULL ===== */
        iframe {
            position: fixed;
            inset: 0;
            width: 100%;
            height: 100%;
            border: none;
        }

        /* ===== FLOATING BACK BUTTON ===== */
        .back-btn {
            position: fixed;
            bottom: 20px;
            left: 20px;
            width: 52px;
            height: 52px;
            border-radius: 50%;
            background: linear-gradient(135deg, #38bdf8, #2563eb);
            color: white;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 20px;
            cursor: pointer;
            box-shadow: 0 10px 25px rgba(37, 99, 235, 0.25);
            z-index: 10;
            transition: 0.3s;
        }

        .back-btn:hover {
            transform: scale(1.1);
        }

        /* ===== LOADER ===== */
        .loader {
            position: fixed;
            inset: 0;
            background: white;
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 20;
        }

        .spinner {
            width: 42px;
            height: 42px;
            border: 4px solid #e2e8f0;
            border-top: 4px solid #2563eb;
            border-radius: 50%;
            animation: spin 1s linear infinite;
        }

        @keyframes spin {
            to {
                transform: rotate(360deg);
            }
        }
    </style>
</head>

<body>

    <!-- LOADER -->
    <div class="loader" id="loader">
        <div class="spinner"></div>
    </div>

    <!-- IFRAME -->
    <iframe id="frame" sandbox="allow-scripts allow-same-origin allow-forms" referrerpolicy="no-referrer">
    </iframe>

    <!-- FLOATING BACK -->
    <div class="back-btn" onclick="goBack()">←</div>

    <script>

        /* ===== SET LINK MANUAL ===== */
        const TARGET_URL = "https://daksin-brainstorming.lovable.app/"; // GANTI DI SINI

        /* ===== WHITELIST ===== */
        const allowedDomains = [
            "https://daksin-brainstorming.lovable.app/"
        ];

        /* ===== VALIDASI ===== */
        function isAllowed(url) {
            return allowedDomains.some(domain => url.startsWith(domain));
        }

        /* ===== LOAD ===== */
        if (isAllowed(TARGET_URL)) {
            document.getElementById("frame").src = TARGET_URL;
        } else {
            document.body.innerHTML = "Access Denied";
        }

        /* ===== LOADER HIDE ===== */
        document.getElementById("frame").onload = () => {
            document.getElementById("loader").style.display = "none";
        };

        /* ===== BACK ===== */
        function goBack() {
            window.location.href = "https://daksinapati.pendidikan.or.id"; // arahkan ke home kamu
        }

        /* ===== BASIC PROTECTION ===== */
        document.addEventListener('contextmenu', e => e.preventDefault());

        document.onkeydown = function (e) {
            if (
                e.keyCode == 123 ||
                (e.ctrlKey && e.shiftKey && e.keyCode == 73) ||
                (e.ctrlKey && e.keyCode == 85)
            ) {
                return false;
            }
        };

        /* ===== DEVTOOLS DETECT ===== */
        setInterval(() => {
            if (window.outerWidth - window.innerWidth > 160) {
                document.body.innerHTML = "Access Denied";
            }
        }, 1000);

    </script>

</body>

</html>
